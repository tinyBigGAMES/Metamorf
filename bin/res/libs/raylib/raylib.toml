[cimporter]
header = "res/libs/raylib/include/raylib.h"
unit_name = "raylib"
output_path = "res/libs/raylib/imports"
source_paths = [
  "res/libs/raylib/include/"
]
save_preprocessed = true
delay_load = true

[[cimporter.include_paths]]
path = "res/libs/raylib/include/"

[[cimporter.post_copy_files]]
platform = "win64"
source = "res\\libs\\raylib\\bin\\raylib.dll"
dest_dir = ".\\"

[[cimporter.post_copy_files]]
platform = "linux64"
source = "res\\libs\\raylib\\bin\\raylib.so"
dest_dir = ".\\"
