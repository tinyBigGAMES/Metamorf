# Myra Test Configuration
#
# Each [[test]] entry registers a test in execution order.
#
# Fields:
#   name         (string, required)   - Test filename without extension
#   deps         (string[], optional) - Dependencies built first, in order
#   run          (boolean, optional)  - true (default) = build and run, false = build only
#   define       (string, optional)   - Conditional define name passed to compiler
#   define_value (string, optional)   - Value for the define (requires define to be set)
#
# Usage:
#   Myra test all                          (uses this file from test folder)
#   Myra test all -c path/to/custom.toml   (uses a custom config file)

[[test]]
name = "test_exe_hello"

[[test]]
name = "test_exe_consts"

[[test]]
name = "test_exe_uselib"

[[test]]
name = "test_exe_ifelse"

[[test]]
name = "test_exe_loops"

[[test]]
name = "test_exe_match"

[[test]]
name = "test_exe_routines"

[[test]]
name = "test_exe_strings"

[[test]]
name = "test_exe_types"

[[test]]
name = "test_exe_vars"

[[test]]
name = "test_lib_utils"

[[test]]
name = "test_exe_mixedmode"

# DLL test — deps are built first before the consumer runs
[[test]]
name = "test_exe_usedll"
deps = ["test_dll_exports"]

# Raylib static — defines STATIC=1 so the test links against libraylib.a
[[test]]
name = "test_exe_raylib"
define = "STATIC"
define_value = "1"

# Raylib dynamic — no define, links against raylib.dll
[[test]]
name = "test_exe_raylib"
